<script>
    const text = "Aytek Siber ile Sistemleriniz Daha Güvenli";
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            document.getElementById("Tarama").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 100);
        }
    }
    window.onload = typeWriter;
</script>
<p id="Tarama" style="color: #0f0;"></p>
